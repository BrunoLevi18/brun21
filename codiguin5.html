<!DOCTYPE html>
<html>
<head>
<style>


html,body{
    height:100%;
    margin:0;
}

body{
    background: linear-gradient(antiquewhite, rgb(0,153,255));
    text-align:center;
    font-family:'Times New Roman', Times, serif;
}


h1{
    color:black;
}


#principal{
    border:3px solid #0000FF; /* HEX */
}


.caixa{
    background-color: antiquewhite;
    width:50%;
    margin:40px auto;
    padding:20px;
    border-radius:10px;
}


.texto{
    color:rgba(0,0,0,0.6);
    
}


p.texto{
    font-size:18px;
    color: gray
}


.texto.destaque{
    color:#cc0000;
    font-weight:bold;
}


.overlay{
    background:rgba(255,255,255,0.4);
    padding:10px;
    border-radius:8px;
}

</style>
</head>

<body>

<h1>Aliens de Ben 10</h1>

<div id="principal" class="caixa">

<div class="overlay">

<p class="texto">Chama (Pyronita): alien com poderes de fogo.</p>

<p class="texto destaque">Diamante (Petrosapien): corpo cristalino resistente.</p>

<p class="texto">Quatro Braços (Tetramando): força física extrema.</p>

</div>

</div>

</body>
</html>
